name: Rails test (Docker Compose)

on:
  # PR作成/更新時に自動でテストを回す（draft→ready の切り替えも拾う）
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # 必要に応じて手動でも実行できるようにしておく
  workflow_dispatch:

concurrency:
  # 同一PRで古い実行が残らないようにキャンセルして最新だけを走らせる
  group: rails-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # compose build が重い場合でもタイムアウトでハングを防ぐ
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        # 失敗時の切り分け用（runner側のDocker/Composeバージョン確認）
        run: |
          docker version
          docker compose version

      - name: Build image
        # Dockerfile / Gemfile.lock の変更を取り込んでイメージをビルド
        run: docker compose build --pull

      - name: Start app container
        # `exec` 前提なので、まず対象サービス(app)を起動
        run: docker compose up -d app

      - name: Prepare database
        # CI上で development DB を触らないように test 環境に固定
        # -T: GitHub Actions ではTTYが無いので必須
        run: docker compose exec -T app bash -lc "RAILS_ENV=test bundle exec rails db:prepare"

      - name: Run tests
        run: docker compose exec -T app bash -lc "RAILS_ENV=test bundle exec rails test"

      - name: Dump logs on failure
        # 失敗時だけログを出して原因調査をしやすくする
        if: failure()
        run: docker compose logs --no-color

      - name: Shutdown
        # 後片付け（volumeも落としてrunnerをクリーンに保つ）
        if: always()
        run: docker compose down -v
