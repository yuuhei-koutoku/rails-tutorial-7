name: Rails test (Docker Compose)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: rails-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Build image
        run: docker compose build --pull

      - name: Start app container
        run: docker compose up -d app

      - name: Prepare database
        run: docker compose exec -T app bash -lc "RAILS_ENV=test bundle exec rails db:prepare"

      - name: Run tests
        run: docker compose exec -T app bash -lc "RAILS_ENV=test bundle exec rails test"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shutdown
        if: always()
        run: docker compose down -v
